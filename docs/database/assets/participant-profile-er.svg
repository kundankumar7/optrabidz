<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="880" viewBox="0 0 1400 880" role="img" aria-labelledby="title desc">
  <title id="title">Participant Profile Context ER diagram</title>
  <desc id="desc">Schema-backed ER slice showing account-owned profile, startup, investor, and participant detail records.</desc>
  <defs>
    <style>
      .canvas{fill:#F7F3EA}.title{font:700 30px "Segoe UI",Arial,sans-serif;fill:#17212B}.subtitle{font:400 14px "Segoe UI",Arial,sans-serif;fill:#5D6775}
      .entity{fill:#FFFDF8;stroke:#C9BBA7;stroke-width:1.5;rx:8}.identity{fill:#EAF6F1;stroke:#2F7D67}.profile{fill:#EAF1FB;stroke:#4E6F9F}.detail{fill:#F2EAF5;stroke:#6E4A7E}
      .head{font:700 16px "Segoe UI",Arial,sans-serif;fill:#17212B}.field{font:400 13px "Segoe UI",Arial,sans-serif;fill:#2E3A46}.key{font:700 13px "Segoe UI",Arial,sans-serif;fill:#17212B}
      .fk{fill:none;stroke:#344253;stroke-width:1.8;stroke-linecap:square;stroke-linejoin:round}.port{fill:#F7F3EA;stroke:#344253;stroke-width:1.6}
      .card{font:700 13px "Segoe UI",Arial,sans-serif;fill:#17212B}.tagbox{fill:#FFFDF8;stroke:#C9BBA7;stroke-width:1}.tag{font:700 12px "Segoe UI",Arial,sans-serif;fill:#17212B}.note{font:400 12px "Segoe UI",Arial,sans-serif;fill:#5D6775}
    </style>
  </defs>
  <rect class="canvas" width="1400" height="880"/>
  <text class="title" x="700" y="46" text-anchor="middle">Participant Profile Context</text>
  <text class="subtitle" x="700" y="74" text-anchor="middle">Account-owned profile, startup, investor, and participant detail records</text>

  <g id="relationships">
    <path class="fk" d="M600 250 V284 H255 V318"/>
    <circle class="port" cx="600" cy="250" r="4"/><circle class="port" cx="255" cy="318" r="4"/>
    <text class="card" x="612" y="274">1</text><text class="card" x="267" y="310">0..1</text>
    <rect class="tagbox" x="233" y="282" width="44" height="22" rx="6"/><text class="tag" x="255" y="298" text-anchor="middle">R2</text>

    <path class="fk" d="M700 250 V318"/>
    <circle class="port" cx="700" cy="250" r="4"/><circle class="port" cx="700" cy="318" r="4"/>
    <text class="card" x="712" y="274">1</text><text class="card" x="712" y="310">0..1</text>
    <rect class="tagbox" x="678" y="280" width="44" height="22" rx="6"/><text class="tag" x="700" y="296" text-anchor="middle">R1</text>

    <path class="fk" d="M800 250 V284 H1145 V318"/>
    <circle class="port" cx="800" cy="250" r="4"/><circle class="port" cx="1145" cy="318" r="4"/>
    <text class="card" x="812" y="274">1</text><text class="card" x="1157" y="310">0..1</text>
    <rect class="tagbox" x="1123" y="282" width="44" height="22" rx="6"/><text class="tag" x="1145" y="298" text-anchor="middle">R3</text>

    <path class="fk" d="M255 470 V540 H160 V608"/>
    <circle class="port" cx="255" cy="470" r="4"/><circle class="port" cx="160" cy="608" r="4"/>
    <text class="card" x="267" y="494">1</text><text class="card" x="172" y="600">0..N</text>
    <rect class="tagbox" x="138" y="548" width="44" height="22" rx="6"/><text class="tag" x="160" y="564" text-anchor="middle">R4</text>

    <path class="fk" d="M255 470 V540 H430 V608"/>
    <circle class="port" cx="430" cy="608" r="4"/>
    <text class="card" x="442" y="600">0..N</text>
    <rect class="tagbox" x="408" y="548" width="44" height="22" rx="6"/><text class="tag" x="430" y="564" text-anchor="middle">R5</text>

    <path class="fk" d="M255 470 V540 H700 V608"/>
    <circle class="port" cx="700" cy="608" r="4"/>
    <text class="card" x="712" y="600">0..N</text>
    <rect class="tagbox" x="678" y="548" width="44" height="22" rx="6"/><text class="tag" x="700" y="564" text-anchor="middle">R6</text>

    <path class="fk" d="M1145 470 V540 H970 V608"/>
    <circle class="port" cx="1145" cy="470" r="4"/><circle class="port" cx="970" cy="608" r="4"/>
    <text class="card" x="1157" y="494">1</text><text class="card" x="982" y="600">0..N</text>
    <rect class="tagbox" x="948" y="548" width="44" height="22" rx="6"/><text class="tag" x="970" y="564" text-anchor="middle">R7</text>

    <path class="fk" d="M1145 470 V540 H1240 V608"/>
    <circle class="port" cx="1240" cy="608" r="4"/>
    <text class="card" x="1252" y="600">0..N</text>
    <rect class="tagbox" x="1218" y="548" width="44" height="22" rx="6"/><text class="tag" x="1240" y="564" text-anchor="middle">R8</text>
  </g>

  <g transform="translate(550 120)">
    <rect class="entity identity" width="300" height="130" rx="8"/>
    <text class="head" x="18" y="32">account</text>
    <text class="key" x="18" y="64">account_id PK</text>
    <text class="field" x="18" y="94">account_state</text>
  </g>

  <g transform="translate(90 320)">
    <rect class="entity identity" width="330" height="150" rx="8"/>
    <text class="head" x="18" y="32">startup</text>
    <text class="key" x="18" y="64">startup_id PK</text>
    <text class="field" x="18" y="94">account_id FK, UK</text>
    <text class="field" x="18" y="120">legal_entity_name</text>
  </g>

  <g transform="translate(535 320)">
    <rect class="entity profile" width="330" height="125" rx="8"/>
    <text class="head" x="18" y="32">profile</text>
    <text class="key" x="18" y="64">profile_id PK</text>
    <text class="field" x="18" y="94">account_id FK, UK</text>
  </g>

  <g transform="translate(980 320)">
    <rect class="entity identity" width="330" height="150" rx="8"/>
    <text class="head" x="18" y="32">investor</text>
    <text class="key" x="18" y="64">investor_id PK</text>
    <text class="field" x="18" y="94">account_id FK, UK</text>
    <text class="field" x="18" y="120">public_display_name</text>
  </g>

  <g transform="translate(40 610)">
    <rect class="entity detail" width="240" height="145" rx="8"/>
    <text class="head" x="18" y="32">startup_legal_registration</text>
    <text class="key" x="18" y="64">registration_id PK</text>
    <text class="field" x="18" y="94">startup_id FK</text>
    <text class="field" x="18" y="120">registration_type</text>
  </g>

  <g transform="translate(310 610)">
    <rect class="entity detail" width="240" height="145" rx="8"/>
    <text class="head" x="18" y="32">startup_web_presence</text>
    <text class="key" x="18" y="64">web_presence_id PK</text>
    <text class="field" x="18" y="94">startup_id FK</text>
    <text class="field" x="18" y="120">url</text>
  </g>

  <g transform="translate(580 610)">
    <rect class="entity detail" width="240" height="145" rx="8"/>
    <text class="head" x="18" y="32">startup_classification</text>
    <text class="key" x="18" y="64">startup_classification_id PK</text>
    <text class="field" x="18" y="94">startup_id FK</text>
    <text class="field" x="18" y="120">type + value UK part</text>
  </g>

  <g transform="translate(850 610)">
    <rect class="entity detail" width="240" height="145" rx="8"/>
    <text class="head" x="18" y="32">investor_web_presence</text>
    <text class="key" x="18" y="64">web_presence_id PK</text>
    <text class="field" x="18" y="94">investor_id FK</text>
    <text class="field" x="18" y="120">url</text>
  </g>

  <g transform="translate(1120 610)">
    <rect class="entity detail" width="240" height="145" rx="8"/>
    <text class="head" x="18" y="32">investor_preference</text>
    <text class="key" x="18" y="64">investor_preference_id PK</text>
    <text class="field" x="18" y="94">investor_id FK</text>
    <text class="field" x="18" y="120">type + value UK part</text>
  </g>

  <text class="note" x="40" y="820">The schema does not define a direct foreign key from profile to startup or investor; all three are account-owned records.</text>
  <text class="note" x="40" y="844">startup and investor each allow at most one row per account through account_id UNIQUE constraints.</text>
</svg>
