<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="650" viewBox="0 0 1200 650" role="img" aria-labelledby="title desc">
  <title id="title">Settlement Context ER diagram</title>
  <desc id="desc">Schema-backed ER slice showing settlement ownership by agreement, startup, and investor.</desc>
  <defs>
    <style>
      .canvas{fill:#F7F3EA}.title{font:700 28px "Segoe UI",Arial,sans-serif;fill:#17212B}.subtitle{font:400 14px "Segoe UI",Arial,sans-serif;fill:#5D6775}
      .entity{fill:#FFFDF8;stroke:#C9BBA7;stroke-width:1.5;rx:8}.actor{fill:#EAF6F1;stroke:#2F7D67}.market{fill:#F2EAF5;stroke:#6E4A7E}.finance{fill:#FFF1DA;stroke:#9A641E}
      .head{font:700 16px "Segoe UI",Arial,sans-serif;fill:#17212B}.field{font:400 13px "Segoe UI",Arial,sans-serif;fill:#2E3A46}.key{font:700 13px "Segoe UI",Arial,sans-serif;fill:#17212B}
      .fk{fill:none;stroke:#344253;stroke-width:1.8;stroke-linecap:square;stroke-linejoin:round}.port{fill:#F7F3EA;stroke:#344253;stroke-width:1.6}
      .card{font:700 13px "Segoe UI",Arial,sans-serif;fill:#17212B}.tagbox{fill:#FFFDF8;stroke:#C9BBA7;stroke-width:1}.tag{font:700 12px "Segoe UI",Arial,sans-serif;fill:#17212B}.note{font:400 12px "Segoe UI",Arial,sans-serif;fill:#5D6775}
    </style>
  </defs>
  <rect class="canvas" width="1200" height="650"/>
  <text class="title" x="600" y="44" text-anchor="middle">Settlement Context</text>
  <text class="subtitle" x="600" y="70" text-anchor="middle">How a confirmed agreement is represented for settlement</text>

  <g id="relationships">
    <path class="fk" d="M250 270 V350 H440"/>
    <circle class="port" cx="250" cy="270" r="4"/><circle class="port" cx="440" cy="350" r="4"/>
    <text class="card" x="262" y="292">1</text><text class="card" x="398" y="340">0..N</text>
    <rect class="tagbox" x="325" y="339" width="44" height="22" rx="6"/><text class="tag" x="347" y="355" text-anchor="middle">R2</text>

    <path class="fk" d="M600 270 V330"/>
    <circle class="port" cx="600" cy="270" r="4"/><circle class="port" cx="600" cy="330" r="4"/>
    <text class="card" x="612" y="292">1</text><text class="card" x="612" y="322">0..1</text>
    <rect class="tagbox" x="578" y="292" width="44" height="22" rx="6"/><text class="tag" x="600" y="308" text-anchor="middle">R1</text>

    <path class="fk" d="M950 270 V350 H760"/>
    <circle class="port" cx="950" cy="270" r="4"/><circle class="port" cx="760" cy="350" r="4"/>
    <text class="card" x="962" y="292">1</text><text class="card" x="772" y="340">0..N</text>
    <rect class="tagbox" x="833" y="339" width="44" height="22" rx="6"/><text class="tag" x="855" y="355" text-anchor="middle">R3</text>
  </g>

  <g transform="translate(100 150)">
    <rect class="entity actor" width="300" height="120" rx="8"/>
    <text class="head" x="18" y="32">startup</text>
    <text class="key" x="18" y="64">startup_id PK</text>
    <text class="field" x="18" y="94">settlement.startup_id FK</text>
  </g>

  <g transform="translate(450 150)">
    <rect class="entity market" width="300" height="120" rx="8"/>
    <text class="head" x="18" y="32">agreement</text>
    <text class="key" x="18" y="64">agreement_id PK</text>
    <text class="field" x="18" y="94">settlement.agreement_id FK, UK</text>
  </g>

  <g transform="translate(800 150)">
    <rect class="entity actor" width="300" height="120" rx="8"/>
    <text class="head" x="18" y="32">investor</text>
    <text class="key" x="18" y="64">investor_id PK</text>
    <text class="field" x="18" y="94">settlement.investor_id FK</text>
  </g>

  <g transform="translate(440 330)">
    <rect class="entity finance" width="320" height="190" rx="8"/>
    <text class="head" x="18" y="32">settlement</text>
    <text class="key" x="18" y="64">settlement_id PK</text>
    <text class="field" x="18" y="94">agreement_id FK, UK</text>
    <text class="field" x="18" y="120">startup_id FK</text>
    <text class="field" x="18" y="146">investor_id FK</text>
    <text class="field" x="18" y="172">settlement_state</text>
  </g>

  <text class="note" x="100" y="585">The database trigger enforces that settlement.startup_id and settlement.investor_id match the selected agreement.</text>
  <text class="note" x="100" y="610">confirmed_payment_intent_id is not shown because it is not a foreign key; payment_intent owns the settlement relationship.</text>
</svg>
