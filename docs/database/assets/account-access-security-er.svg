<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Account Access and Security Context ER diagram</title>
  <desc id="desc">Schema-backed ER slice showing account relationships to role, credential, session, and admin records.</desc>
  <defs>
    <style>
      .canvas{fill:#F7F3EA}.title{font:700 28px "Segoe UI",Arial,sans-serif;fill:#17212B}.subtitle{font:400 14px "Segoe UI",Arial,sans-serif;fill:#5D6775}
      .entity{fill:#FFFDF8;stroke:#C9BBA7;stroke-width:1.5;rx:8}.identity{fill:#EAF6F1;stroke:#2F7D67}.security{fill:#E8F6F8;stroke:#2E7D8D}.governance{fill:#FCEAE5;stroke:#B45A45}
      .head{font:700 16px "Segoe UI",Arial,sans-serif;fill:#17212B}.field{font:400 13px "Segoe UI",Arial,sans-serif;fill:#2E3A46}.key{font:700 13px "Segoe UI",Arial,sans-serif;fill:#17212B}
      .fk{fill:none;stroke:#344253;stroke-width:1.8;stroke-linecap:square;stroke-linejoin:round}.port{fill:#F7F3EA;stroke:#344253;stroke-width:1.6}
      .card{font:700 13px "Segoe UI",Arial,sans-serif;fill:#17212B}.tagbox{fill:#FFFDF8;stroke:#C9BBA7;stroke-width:1}.tag{font:700 12px "Segoe UI",Arial,sans-serif;fill:#17212B}.note{font:400 12px "Segoe UI",Arial,sans-serif;fill:#5D6775}
    </style>
  </defs>
  <rect class="canvas" width="1200" height="700"/>
  <text class="title" x="600" y="44" text-anchor="middle">Account Access and Security Context</text>
  <text class="subtitle" x="600" y="70" text-anchor="middle">Account-owned role, credential, session, and administrator authority records</text>

  <g id="relationships">
    <path class="fk" d="M510 274 V320 H180 V386"/>
    <circle class="port" cx="510" cy="274" r="4"/><circle class="port" cx="180" cy="386" r="4"/>
    <text class="card" x="522" y="296">1</text><text class="card" x="192" y="378">0..1</text>
    <rect class="tagbox" x="158" y="318" width="44" height="22" rx="6"/><text class="tag" x="180" y="334" text-anchor="middle">R1</text>

    <path class="fk" d="M570 274 V342 H460 V386"/>
    <circle class="port" cx="570" cy="274" r="4"/><circle class="port" cx="460" cy="386" r="4"/>
    <text class="card" x="582" y="296">1</text><text class="card" x="472" y="378">0..1</text>
    <rect class="tagbox" x="492" y="330" width="44" height="22" rx="6"/><text class="tag" x="514" y="346" text-anchor="middle">R2</text>

    <path class="fk" d="M630 274 V342 H740 V386"/>
    <circle class="port" cx="630" cy="274" r="4"/><circle class="port" cx="740" cy="386" r="4"/>
    <text class="card" x="642" y="296">1</text><text class="card" x="752" y="378">0..N</text>
    <rect class="tagbox" x="664" y="330" width="44" height="22" rx="6"/><text class="tag" x="686" y="346" text-anchor="middle">R3</text>

    <path class="fk" d="M690 274 V320 H1020 V386"/>
    <circle class="port" cx="690" cy="274" r="4"/><circle class="port" cx="1020" cy="386" r="4"/>
    <text class="card" x="702" y="296">1</text><text class="card" x="1032" y="378">0..1</text>
    <rect class="tagbox" x="998" y="318" width="44" height="22" rx="6"/><text class="tag" x="1020" y="334" text-anchor="middle">R4</text>

    <path class="fk" d="M754 197 H1160 V470 H1142"/>
    <circle class="port" cx="754" cy="197" r="4"/><circle class="port" cx="1142" cy="470" r="4"/>
    <text class="card" x="766" y="190">0..1</text><text class="card" x="1148" y="462">0..N</text>
    <rect class="tagbox" x="1138" y="326" width="44" height="22" rx="6"/><text class="tag" x="1160" y="342" text-anchor="middle">R5</text>
  </g>

  <g transform="translate(450 120)">
    <rect class="entity identity" width="300" height="150" rx="8"/>
    <text class="head" x="18" y="32">account</text>
    <text class="key" x="18" y="64">account_id PK</text>
    <text class="field" x="18" y="94">account_state</text>
    <text class="field" x="18" y="120">created_at</text>
  </g>

  <g transform="translate(60 390)">
    <rect class="entity identity" width="240" height="145" rx="8"/>
    <text class="head" x="18" y="32">role</text>
    <text class="key" x="18" y="64">role_id PK</text>
    <text class="field" x="18" y="94">account_id FK, UK</text>
    <text class="field" x="18" y="120">role_type</text>
  </g>

  <g transform="translate(340 390)">
    <rect class="entity security" width="240" height="145" rx="8"/>
    <text class="head" x="18" y="32">credential</text>
    <text class="key" x="18" y="64">credential_id PK</text>
    <text class="field" x="18" y="94">account_id FK, UK</text>
    <text class="field" x="18" y="120">email UK</text>
  </g>

  <g transform="translate(620 390)">
    <rect class="entity security" width="240" height="145" rx="8"/>
    <text class="head" x="18" y="32">session</text>
    <text class="key" x="18" y="64">session_id PK</text>
    <text class="field" x="18" y="94">account_id FK</text>
    <text class="field" x="18" y="120">session_status</text>
  </g>

  <g transform="translate(900 390)">
    <rect class="entity governance" width="240" height="170" rx="8"/>
    <text class="head" x="18" y="32">admin</text>
    <text class="key" x="18" y="64">admin_id PK</text>
    <text class="field" x="18" y="94">account_id FK, UK</text>
    <text class="field" x="18" y="120">revoked_by_account_id FK</text>
    <text class="field" x="18" y="146">admin_state</text>
  </g>

  <text class="note" x="60" y="638">login_attempt is not shown because the schema stores it by email only and defines no foreign key to account or credential.</text>
  <text class="note" x="60" y="662">profile, startup, and investor records are intentionally kept out of this access-focused slice.</text>
</svg>
