<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="650" viewBox="0 0 1200 650" role="img" aria-labelledby="title desc">
  <title id="title">Payment Attempt and Provider Context ER diagram</title>
  <desc id="desc">Schema-backed ER slice showing payment attempts, payment intents, payment providers, and provider method configuration.</desc>
  <defs>
    <style>
      .canvas{fill:#F7F3EA}.title{font:700 28px "Segoe UI",Arial,sans-serif;fill:#17212B}.subtitle{font:400 14px "Segoe UI",Arial,sans-serif;fill:#5D6775}
      .entity{fill:#FFFDF8;stroke:#C9BBA7;stroke-width:1.5;rx:8}.payment{fill:#FCEBE6;stroke:#B55239}.config{fill:#FFF1DA;stroke:#9A641E}
      .head{font:700 16px "Segoe UI",Arial,sans-serif;fill:#17212B}.field{font:400 13px "Segoe UI",Arial,sans-serif;fill:#2E3A46}.key{font:700 13px "Segoe UI",Arial,sans-serif;fill:#17212B}
      .fk{fill:none;stroke:#344253;stroke-width:1.8;stroke-linecap:square;stroke-linejoin:round}.port{fill:#F7F3EA;stroke:#344253;stroke-width:1.6}
      .card{font:700 13px "Segoe UI",Arial,sans-serif;fill:#17212B}.tagbox{fill:#FFFDF8;stroke:#C9BBA7;stroke-width:1}.tag{font:700 12px "Segoe UI",Arial,sans-serif;fill:#17212B}.note{font:400 12px "Segoe UI",Arial,sans-serif;fill:#5D6775}
    </style>
  </defs>
  <rect class="canvas" width="1200" height="650"/>
  <text class="title" x="600" y="44" text-anchor="middle">Payment Attempt and Provider Context</text>
  <text class="subtitle" x="600" y="70" text-anchor="middle">How a payment attempt belongs to an intent and is processed by a provider</text>

  <g id="relationships">
    <path class="fk" d="M370 260 H445"/>
    <circle class="port" cx="370" cy="260" r="4"/><circle class="port" cx="445" cy="260" r="4"/>
    <text class="card" x="382" y="248">1</text><text class="card" x="405" y="283">0..N</text>
    <rect class="tagbox" x="387" y="249" width="44" height="22" rx="6"/><text class="tag" x="409" y="265" text-anchor="middle">R1</text>

    <path class="fk" d="M805 300 H870"/>
    <circle class="port" cx="805" cy="300" r="4"/><circle class="port" cx="870" cy="300" r="4"/>
    <text class="card" x="815" y="288">0..N</text><text class="card" x="854" y="288">1</text>
    <rect class="tagbox" x="816" y="309" width="44" height="22" rx="6"/><text class="tag" x="838" y="325" text-anchor="middle">R2</text>

    <path class="fk" d="M995 330 V430"/>
    <circle class="port" cx="995" cy="330" r="4"/><circle class="port" cx="995" cy="430" r="4"/>
    <text class="card" x="1007" y="354">1</text><text class="card" x="1007" y="422">0..N</text>
    <rect class="tagbox" x="973" y="374" width="44" height="22" rx="6"/><text class="tag" x="995" y="390" text-anchor="middle">R3</text>
  </g>

  <g transform="translate(80 180)">
    <rect class="entity payment" width="290" height="160" rx="8"/>
    <text class="head" x="18" y="32">payment_intent</text>
    <text class="key" x="18" y="64">payment_intent_id PK</text>
    <text class="field" x="18" y="94">payment_purpose</text>
    <text class="field" x="18" y="120">payment_state</text>
    <text class="field" x="18" y="146">idempotency_key UK</text>
  </g>

  <g transform="translate(455 180)">
    <rect class="entity payment" width="350" height="200" rx="8"/>
    <text class="head" x="18" y="32">payment_attempt</text>
    <text class="key" x="18" y="64">payment_attempt_id PK</text>
    <text class="field" x="18" y="94">payment_intent_id FK</text>
    <text class="field" x="18" y="120">provider_code FK</text>
    <text class="field" x="18" y="146">method_type</text>
    <text class="field" x="18" y="172">attempt_state</text>
  </g>

  <g transform="translate(870 180)">
    <rect class="entity payment" width="250" height="150" rx="8"/>
    <text class="head" x="18" y="32">payment_provider</text>
    <text class="key" x="18" y="64">provider_code PK</text>
    <text class="field" x="18" y="94">display_name</text>
    <text class="field" x="18" y="120">enabled</text>
  </g>

  <g transform="translate(870 430)">
    <rect class="entity config" width="250" height="150" rx="8"/>
    <text class="head" x="18" y="32">payment_provider_method</text>
    <text class="field" x="18" y="64">provider_code PK, FK</text>
    <text class="field" x="18" y="90">method_type PK</text>
    <text class="field" x="18" y="116">currency_code PK</text>
    <text class="field" x="18" y="140">enabled</text>
  </g>

  <text class="note" x="80" y="590">payment_attempt.method_type is stored on the attempt, but the schema does not define a foreign key to payment_provider_method.</text>
  <text class="note" x="80" y="615">Relationship badges map to the schema-backed table below this diagram.</text>
</svg>
