spring.application.name=optrabidz

# Use the dev profile by default for local runs. CI and tests override this to test.
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

server.servlet.session.timeout=8h
optrabidz.security.session-duration=PT8H
optrabidz.security.max-login-failures=5

# Disable Spring Boot default generated user because OptraBidz uses custom credential/session authentication.
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

# First admin is created only when explicitly enabled.
# Prefer passing these through environment variables or local dev config.
optrabidz.admin.bootstrap.enabled=false
optrabidz.admin.bootstrap.recovery-mode=false
optrabidz.admin.bootstrap.recovery-token=

optrabidz.governance.eligibility.require-startup-classification-for-listing=true
optrabidz.governance.eligibility.require-investor-preferences-for-bidding=true
optrabidz.governance.lifecycle.scheduler.enabled=true
optrabidz.governance.lifecycle.scheduler.initial-delay-ms=60000
optrabidz.governance.lifecycle.scheduler.fixed-delay-ms=300000
optrabidz.governance.lifecycle.expiry-batch-size=100

optrabidz.marketplace.listing.default-expiry-days=14

optrabidz.outbox.dispatcher.enabled=true
optrabidz.outbox.dispatcher.initial-delay-ms=5000
optrabidz.outbox.dispatcher.fixed-delay-ms=5000
optrabidz.outbox.dispatcher.batch-size=50

optrabidz.notification.dispatcher.enabled=true
optrabidz.notification.dispatcher.initial-delay-ms=5000
optrabidz.notification.dispatcher.fixed-delay-ms=5000
optrabidz.notification.dispatcher.batch-size=50
optrabidz.notification.dispatcher.max-attempts=3
optrabidz.notification.channels.email.enabled=true
optrabidz.notification.channels.push.enabled=true

optrabidz.financial.settlement.expiry-minutes=30
optrabidz.financial.payment-intent.expiry-minutes=15
optrabidz.financial.repayment.expiry-days=7
optrabidz.financial.local-provider.enabled=false
optrabidz.financial.sandbox-providers.enabled=false

# Configure provider webhook HMAC secrets through environment-specific properties.
# Example: optrabidz.financial.webhook.hmac-secrets.UPI=${OPTRABIDZ_UPI_WEBHOOK_SECRET:}
