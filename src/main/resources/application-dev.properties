# DATABASE
spring.datasource.url=${OPTRABIDZ_DATASOURCE_URL:jdbc:postgresql://localhost:5432/optrabidz}
spring.datasource.username=${OPTRABIDZ_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${OPTRABIDZ_DATASOURCE_PASSWORD:postgres}

spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.generate-ddl=false
spring.jpa.properties.hibernate.format_sql=true

# IMPORTANT -- Keeps architecture clean (prevents lazy loading leaks)
spring.jpa.open-in-view=false

# DEBUG (optional, enable when needed)
# logging.level.org.hibernate.SQL=DEBUG
# logging.level.org.hibernate.type.descriptor.sql=TRACE

optrabidz.admin.bootstrap.enabled=${OPTRABIDZ_ADMIN_BOOTSTRAP_ENABLED:true}
optrabidz.admin.bootstrap.email=${OPTRABIDZ_ADMIN_BOOTSTRAP_EMAIL:admin1@gmail.com}
optrabidz.admin.bootstrap.password=${OPTRABIDZ_ADMIN_BOOTSTRAP_PASSWORD:admin001}
optrabidz.admin.bootstrap.public-display-name=${OPTRABIDZ_ADMIN_BOOTSTRAP_DISPLAY_NAME:Platform Admin One}
optrabidz.admin.bootstrap.organization-label=${OPTRABIDZ_ADMIN_BOOTSTRAP_ORGANIZATION:OptraBidz Governance}
optrabidz.admin.bootstrap.recovery-mode=${OPTRABIDZ_ADMIN_RECOVERY_MODE:true}
optrabidz.admin.bootstrap.recovery-token=${OPTRABIDZ_ADMIN_RECOVERY_TOKEN:local-recovery-token-001}

optrabidz.financial.local-provider.enabled=true
optrabidz.financial.sandbox-providers.enabled=true
optrabidz.financial.webhook.hmac-secrets.UPI=${OPTRABIDZ_UPI_WEBHOOK_SECRET:local-upi-webhook-secret}
optrabidz.financial.webhook.hmac-secrets.CARD=${OPTRABIDZ_CARD_WEBHOOK_SECRET:local-card-webhook-secret}
