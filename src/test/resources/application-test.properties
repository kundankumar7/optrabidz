spring.main.banner-mode=off

# Test profile must never depend on the developer database.
# PostgreSQL connection details are provided by Testcontainers in integration tests.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:db/test/postgres-enums.sql
spring.sql.init.separator=@@

optrabidz.admin.bootstrap.enabled=false
optrabidz.admin.bootstrap.recovery-mode=false
optrabidz.admin.bootstrap.recovery-token=

optrabidz.governance.lifecycle.scheduler.enabled=false
optrabidz.governance.lifecycle.expiry-batch-size=25
optrabidz.governance.eligibility.require-startup-classification-for-listing=true
optrabidz.governance.eligibility.require-investor-preferences-for-bidding=true

optrabidz.marketplace.listing.default-expiry-days=14

optrabidz.notification.dispatcher.enabled=true
optrabidz.notification.dispatcher.initial-delay-ms=600000
optrabidz.notification.dispatcher.fixed-delay-ms=600000
optrabidz.notification.dispatcher.batch-size=25
optrabidz.notification.dispatcher.max-attempts=3
optrabidz.notification.channels.email.enabled=true
optrabidz.notification.channels.push.enabled=true

optrabidz.financial.settlement.expiry-minutes=30
optrabidz.financial.payment-intent.expiry-minutes=15
optrabidz.financial.repayment.expiry-days=7
optrabidz.financial.local-provider.enabled=true
optrabidz.financial.sandbox-providers.enabled=true
optrabidz.financial.webhook.hmac-secrets.UPI=test-upi-webhook-secret
optrabidz.financial.webhook.hmac-secrets.CARD=test-card-webhook-secret
